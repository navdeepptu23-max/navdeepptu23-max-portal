{% extends "base.html" %}
{% block title %}Dashboard | Fresh Portal{% endblock %}
{% block content %}
<section class="card">
  <h1>Dashboard</h1>
  <p>Welcome, <strong>{{ user.username }}</strong>.</p>
  <p>Your user ID is <strong>{{ user.id }}</strong>.</p>
  <p>Your email is <strong>{{ user.email }}</strong>.</p>
  <a class="btn-link" href="{{ url_for('logout') }}">Logout</a>
</section>
{% endblock %}
