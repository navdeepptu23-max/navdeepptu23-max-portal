{% extends "base.html" %}
{% block title %}Register | Fresh Portal{% endblock %}
{% block content %}
<section class="card">
  <h1>Create account</h1>
  <form method="post" class="form-grid">
    <label>Username
      <input type="text" name="username" required autofocus>
    </label>
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Password
      <input type="password" name="password" minlength="8" required>
    </label>
    <button type="submit">Register</button>
  </form>
  <p class="helper">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
</section>
{% endblock %}
