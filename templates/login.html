{% extends "base.html" %}

{% block title %}Login - Portal{% endblock %}

{% block extra_css %}
<style>
    .login-logo {
        text-align: center;
        margin-bottom: 8px;
    }
    .login-logo .logo-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
    }
    .login-logo .logo-icon svg {
        width: 30px;
        height: 30px;
        fill: white;
    }
    .login-logo h1 {
        font-size: 22px;
        font-weight: 700;
        color: #333;
        margin: 0;
    }
    .login-logo p {
        color: #888;
        font-size: 13px;
        margin: 4px 0 0;
    }
    .divider {
        border: none;
        border-top: 1px solid #eee;
        margin: 20px 0;
    }
    .password-wrapper {
        position: relative;
    }
    .password-wrapper input {
        padding-right: 40px;
    }
    .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #aaa;
        user-select: none;
        font-size: 16px;
        line-height: 1;
    }
    .toggle-password:hover {
        color: #667eea;
    }
    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        font-size: 13px;
    }
    .remember-forgot label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        margin: 0;
        font-weight: 400;
        color: #555;
    }
    .remember-forgot input[type="checkbox"] {
        width: 15px;
        height: 15px;
        accent-color: #667eea;
    }
    .remember-forgot a {
        color: #667eea;
        text-decoration: none;
        font-size: 13px;
    }
    .remember-forgot a:hover {
        text-decoration: underline;
    }
    .btn-login {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition: opacity 0.2s, transform 0.2s;
    }
    .btn-login:hover {
        opacity: 0.92;
        transform: translateY(-1px);
    }
    .admin-link {
        text-align: center;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid #eee;
        font-size: 12px;
        color: #999;
    }
    .admin-link a {
        color: #999;
        text-decoration: none;
    }
    .admin-link a:hover {
        color: #667eea;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="login-logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
        </div>
        <h1>Portal Login</h1>
        <p>Sign in to your account</p>
    </div>

    <hr class="divider">

    <form method="POST">
        <div class="form-group">
            <label for="username">Username, Email, or User ID</label>
            <input type="text" id="username" name="username" placeholder="Enter username, email, or user ID" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password"
                       placeholder="Enter your password"
                       required autocomplete="current-password">
                <span class="toggle-password" onclick="togglePassword()" title="Show/hide password">&#128065;</span>
            </div>
        </div>

        <div class="remember-forgot">
            <label>
                <input type="checkbox" name="remember" id="remember">
                Remember me
            </label>
            <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="links">
        <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>

    <div class="admin-link">
        <a href="{{ url_for('admin_login') }}">Admin login &rarr;</a>
    </div>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    const icon = document.querySelector('.toggle-password');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.textContent = '🙈';
    } else {
        pwd.type = 'password';
        icon.innerHTML = '&#128065;';
    }
}
</script>
{% endblock %}
