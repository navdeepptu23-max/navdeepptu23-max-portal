{% extends "auth_base.html" %}

{% block title %}Login - Portal{% endblock %}

{% block extra_css %}
<style>
.auth-card-premium {
  animation: slideInUp .55s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes slideInUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.divider-with-text {
  position: relative;
  text-align: center;
  margin: 1.5rem 0;
  font-size: .8rem;
  font-weight: 600;
  text-transform: uppercase;
  color: var(--text-muted);
}

.divider-with-text::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 100%;
  height: 1px;
  background: var(--border);
  z-index: 0;
}

.divider-with-text span {
  position: relative;
  background: white;
  padding: 0 .75rem;
  z-index: 1;
}

.social-login {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .75rem;
  margin-bottom: 1.5rem;
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  padding: .7rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: white;
  cursor: pointer;
  transition: all .25s;
  text-decoration: none;
  color: var(--text);
  font-size: .85rem;
  font-weight: 600;
}

.social-btn:hover {
  border-color: var(--primary);
  background: #f7fafc;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102,126,234,.15);
}

.option-forget {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  font-size: .85rem;
  flex-wrap: wrap;
  gap: .5rem;
}

.option-forget label {
  display: flex;
  align-items: center;
  gap: .5rem;
  cursor: pointer;
  margin: 0;
  font-weight: 500;
  color: var(--text);
}

.option-forget label input {
  accent-color: var(--primary);
  cursor: pointer;
}

.option-forget a {
  color: var(--primary);
  font-weight: 600;
  text-decoration: none;
  white-space: nowrap;
}

.option-forget a:hover {
  text-decoration: underline;
}

.signup-section {
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  text-align: center;
}

.signup-text {
  font-size: .85rem;
  color: var(--text-muted);
}

.signup-text a {
  color: var(--primary);
  font-weight: 700;
  text-decoration: none;
  margin-left: .25rem;
}

.signup-text a:hover {
  text-decoration: underline;
}

.admin-link {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: .75rem;
}

.admin-link a {
  color: var(--text-muted);
  text-decoration: none;
  transition: color .2s;
}

.admin-link a:hover {
  color: var(--primary);
}
</style>
{% endblock %}

{% block content %}
<div class="auth-card auth-card-premium">
  <!-- Logo Section -->
  <div class="auth-logo fade-in-up">
    <div class="logo-circle" style="animation: pulse 2s infinite;">
      <i class="fas fa-sign-in-alt"></i>
    </div>
    <h1>Welcome Back</h1>
    <p>Access your healthcare data portal</p>
  </div>

  <hr class="auth-divider">

  <!-- Social Login Options -->
  <div class="social-login fade-in-up delay-1" style="opacity:0;animation:fadeInUp .5s ease forwards .15s;">
    <a href="#" class="social-btn" onclick="return false;" title="Sign in with Google (Coming Soon)">
      <i class="fab fa-google" style="color:#EA4335;font-size:1.1rem;"></i>
      <span>Google</span>
    </a>
    <a href="#" class="social-btn" onclick="return false;" title="Sign in with GitHub (Coming Soon)">
      <i class="fab fa-github" style="font-size:1.1rem;"></i>
      <span>GitHub</span>
    </a>
  </div>

  <div class="divider-with-text" style="opacity:0;animation:fadeInUp .5s ease forwards .25s;"><span>Or continue with email</span></div>

  <!-- Login Form -->
  <form method="POST" autocomplete="on" id="login-form" style="opacity:0;animation:fadeInUp .5s ease forwards .3s;">
    <!-- Username/Email Field -->
    <div class="form-group">
      <label for="username" style="display:flex;align-items:center;gap:.4rem;">
        <i class="fas fa-user" style="width:16px;text-align:center;"></i>
        Username, Email, or User ID
      </label>
      <input class="form-control" type="text" id="username" name="username"
             placeholder="admin, user@example.com, or #1234" required autofocus
             autocomplete="username" 
             value="{{ request.form.get('username', '') }}"
             style="font-size:.95rem;">
    </div>

    <!-- Password Field -->
    <div class="form-group">
      <label for="password" style="display:flex;align-items:center;gap:.4rem;">
        <i class="fas fa-lock" style="width:16px;text-align:center;"></i>
        Password
      </label>
      <div class="input-icon-wrap" style="position:relative;">
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Enter your password" required autocomplete="current-password"
               style="font-size:.95rem;padding-right:2.5rem;">
        <span class="icon" onclick="togglePassword('password', this)" 
              style="position:absolute;right:.9rem;top:50%;transform:translateY(-50%);cursor:pointer;user-select:none;color:#cbd5e0;font-size:1.1rem;transition:color .2s;" 
              title="Show/hide password">👁️</span>
      </div>
    </div>

    <!-- Remember & Forgot Password -->
    <div class="option-forget">
      <label>
        <input type="checkbox" name="remember" id="remember" autocomplete="off">
        Keep me signed in
      </label>
      <a href="{{ url_for('forgot_password') }}">
        <i class="fas fa-question-circle"></i> Forgot?
      </a>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary btn-block" 
            style="padding:.8rem;font-size:.96rem;font-weight:700;letter-spacing:.5px;">
      <i class="fas fa-arrow-right"></i> Sign In
    </button>
  </form>

  <!-- Sign Up Link -->
  <div class="signup-section">
    <div class="signup-text">
      New to Portal?
      <a href="{{ url_for('register') }}">Create account free →</a>
    </div>
  </div>

  <!-- Admin Link -->
  <div class="admin-link">
    <a href="{{ url_for('admin_login') }}">Staff login →</a>
  </div>
</div>
{% endblock %}
