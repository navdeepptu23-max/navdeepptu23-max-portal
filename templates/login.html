{% extends "auth_base.html" %}

{% block title %}Login - Portal{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-logo">
    <div class="logo-circle"><i class="fas fa-sign-in-alt"></i></div>
    <h1>Welcome Back</h1>
    <p>Sign in to your account</p>
  </div>

  <hr class="auth-divider">

  <form method="POST" autocomplete="on">
    <div class="form-group">
      <label for="username">Username, Email, or User ID</label>
      <input class="form-control" type="text" id="username" name="username"
             placeholder="username, email, or ID" required autofocus
             autocomplete="username"
             value="{{ request.form.get('username', '') }}">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-icon-wrap">
        <input class="form-control" type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password">
        <span class="icon" onclick="togglePassword('password', this)" title="Show/hide password">&#128065;</span>
      </div>
    </div>

    <div class="remember-forgot">
      <label>
        <input type="checkbox" name="remember" id="remember" autocomplete="off">
        Remember me
      </label>
      <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-primary btn-block">
      <i class="fas fa-arrow-right"></i> Sign In
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="{{ url_for('register') }}">Create one free</a>
  </div>

  <div style="text-align:center;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.8rem;">
    <a href="{{ url_for('admin_login') }}" style="color:var(--text-muted);">Admin login &rarr;</a>
  </div>
</div>

<style>
.remember-forgot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
  font-size: .85rem;
}
.remember-forgot label {
  display: flex;
  align-items: center;
  gap: .5rem;
  cursor: pointer;
  margin: 0;
  font-weight: 500;
}
.remember-forgot input[type="checkbox"] {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--primary);
}
.remember-forgot a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}
.remember-forgot a:hover {
  text-decoration: underline;
}
.input-icon-wrap {
  position: relative;
}
.input-icon-wrap .form-control {
  padding-right: 2.5rem;
}
.input-icon-wrap .icon {
  position: absolute;
  right: .9rem;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #cbd5e0;
  font-size: 1.1rem;
  user-select: none;
  transition: color .2s;
}
.input-icon-wrap .icon:hover {
  color: var(--primary);
}
</style>
{% endblock %}
