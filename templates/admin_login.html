{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-header bg-danger text-white text-center py-4">
                    <h2 class="mb-0">🔐 Admin Login</h2>
                    <small>Authorized personnel only</small>
                </div>
                <div class="card-body p-4">
                    {% with messages = get_flashed_messages(category_filter=['danger']) %}
                        {% if messages %}
                            <div class="alert alert-danger">
                                {{ messages[0] }}
                            </div>
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">Admin Username</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                        </div>

                        <button type="submit" class="btn btn-danger btn-lg w-100">
                            <i class="bi bi-lock"></i> Login as Admin
                        </button>
                    </form>

                    <hr class="my-4">
                    <p class="text-muted text-center mb-0">
                        <a href="{{ url_for('index') }}" class="text-decoration-none">← Back to Portal</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
