{% extends 'base.html' %}
{% block title %}Forgot Password | Nova Portal{% endblock %}
{% block content %}
<section class="card">
  <h2>Forgot Password</h2>
  <p>Enter your username and registered email, then set a new password.</p>
  <form method="post" class="form-grid form-grid-2">
    <label>Username
      <input type="text" name="username" required />
    </label>
    <label>Registered Email
      <input type="email" name="email" required />
    </label>
    <label>New Password
      <input type="password" name="new_password" required />
    </label>
    <label>Confirm Password
      <input type="password" name="confirm_password" required />
    </label>
    <div class="cta-row">
      <button class="btn primary" type="submit">Update Password</button>
      <a class="btn ghost" href="{{ url_for('login') }}">Back to Login</a>
    </div>
  </form>
</section>
{% endblock %}
