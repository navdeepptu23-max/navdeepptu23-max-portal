{% extends 'base.html' %}
{% block title %}Login | Nova Portal{% endblock %}
{% block content %}
<section class="card">
  <h2>Login</h2>
  <form method="post" class="form-grid">
    <label>Username, Email, or User ID
      <input type="text" name="username" placeholder="Enter username, email, or user ID" required />
    </label>
    <label>Password
      <input type="password" name="password" required />
    </label>
    <button class="btn primary" type="submit">Login</button>
  </form>
  <p style="margin-top:1rem;"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
</section>
{% endblock %}
